name: "Pillar 3 — Document AI CI"

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "pillar3-document-ai/**"
      - ".github/workflows/pillar3-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "pillar3-document-ai/**"

defaults:
  run:
    working-directory: pillar3-document-ai

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=document_ai --cov-report=term-missing

  deploy-dev:
    name: Deploy to Dev
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-peak10docaidev
          package: pillar3-document-ai
          scm-do-build-during-deployment: true
          enable-oryx-build: true
